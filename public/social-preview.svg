<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Import Google Fonts: Inter and Newsreader -->
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500;1,6..72,600;1,6..72,700&display=swap');

      .font-brand {
        font-family: 'Newsreader', Georgia, serif;
        font-style: italic;
      }
      .font-sans {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
    ]]></style>

    <!-- Deep Blur for Ambient Background Glows -->
    <filter id="ambient-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="100" />
    </filter>

    <!-- Ambient Gradients -->
    <radialGradient id="indigo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="1" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
    </radialGradient>
    
    <radialGradient id="slate-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#475569" stop-opacity="1" />
      <stop offset="100%" stop-color="#475569" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- 1. Deep Rich Background -->
  <rect width="100%" height="100%" fill="#09090b" />
  
  <!-- 2. Ambient Editorial Glows (Sleek light-play in background) -->
  <g filter="url(#ambient-blur)" opacity="0.35">
    <!-- Center indigo glow focusing on logo/branding -->
    <circle cx="600" cy="315" r="340" fill="url(#indigo-glow)" />
    <!-- Subtle bottom-left warm slate glow -->
    <circle cx="150" cy="550" r="280" fill="url(#slate-glow)" opacity="0.4" />
    <!-- Subtle top-right warm slate glow -->
    <circle cx="1050" cy="80" r="250" fill="url(#slate-glow)" opacity="0.3" />
  </g>

  <!-- 3. Centered Minimalist Branding Group (Perfectly Balanced Vertically) -->
  
  <!-- Horizontal Logo + Name Lockup (Centered Horizontally) -->
  <g transform="translate(442, 202)">
    <!-- Logo Symbol (scaled to 95px tall) -->
    <g transform="scale(0.95)">
      <rect width="100" height="100" rx="22" fill="#6366f1" />
      <g transform="translate(18, 18) scale(2)">
        <path d="M8 22 C10 14, 14 8, 18 8 C22 8, 24 12, 22 18 C20 24, 16 26, 12 24 C9 22.5, 11 17, 16 15 C21 13, 24 17, 26 21" fill="none" stroke="#ffffff" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="26" cy="21" r="2" fill="#ffffff" />
      </g>
    </g>
    <!-- Title "Signity" (Aligned on the right of the logo) -->
    <text x="115" y="72" class="font-brand" font-size="76" font-weight="700" fill="#ffffff" text-anchor="start" letter-spacing="-0.01em">Signity</text>
  </g>

  <!-- Tagline (Centered below the lockup) -->
  <text x="600" y="362" class="font-sans" font-size="28" font-weight="700" fill="#f4f4f5" text-anchor="middle" letter-spacing="-0.03em">
    Beautiful Digital Signatures, Privately
  </text>

  <!-- Description / Core Services (Centered below the tagline) -->
  <text x="600" y="412" class="font-sans" font-size="16" font-weight="400" fill="#a1a1aa" text-anchor="middle" letter-spacing="0.01em">
    100% Private &amp; Client-Side  •  Automatic Cropping  •  Premium Transparent PNG
  </text>

</svg>
